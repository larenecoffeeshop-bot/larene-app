<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Ma Sélection — L'Arène Coffee Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c0c;color:#fff;font-family:'Poppins',sans-serif;min-height:100vh;padding:20px 16px 40px}
.header{text-align:center;margin-bottom:24px}
.header img{width:200px;height:auto;margin-bottom:10px}
.header p{color:#888;font-size:13px}
.count{text-align:center;font-size:14px;color:#8247f5;font-weight:500;margin-bottom:20px}
h2.section{font-family:'Oswald',sans-serif;font-size:18px;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06)}
.card{background:#151515;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06)}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card h3{font-family:'Oswald',sans-serif;font-size:17px;text-transform:uppercase;letter-spacing:0.02em}
.card .brand{font-size:12px;color:#777;margin-top:2px}
.card .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.info-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.info-row .icon{font-size:13px;flex-shrink:0;width:18px;text-align:center;margin-top:1px}
.info-row .text{font-size:13px;color:#b0b0b0;line-height:1.4}
.info-row .text strong{color:#fff;font-weight:500}
.timing{color:#8247f5;font-weight:500}
.warning{color:#FF6B6B}
.routine{background:#151515;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06)}
.routine .moment{font-family:'Oswald',sans-serif;font-size:15px;text-transform:uppercase;color:#8247f5;letter-spacing:0.04em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.routine .moment .line{flex:1;height:1px;background:rgba(130,71,245,0.2)}
.routine .prod{font-size:13px;color:#b0b0b0;margin-bottom:4px;padding-left:4px}
.routine .prod strong{color:#fff}
.footer{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06)}
.footer p{font-size:12px;color:#555;line-height:1.6;margin-bottom:12px}
.footer-btns{display:flex;flex-direction:column;gap:10px;align-items:center}
.footer-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:300px;padding:12px 20px;border-radius:24px;text-decoration:none;font-family:'Oswald',sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:0.04em;transition:opacity 0.2s}
.footer-btn:active{opacity:0.8}
.btn-insta{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff}
.btn-wa{background:#25D366;color:#fff}
.empty{text-align:center;padding:60px 20px;color:#777}
.empty .big{font-size:40px;margin-bottom:16px}

/* ===== TICKET FORMAT — Lisible pour le comptoir ===== */
.ticket{background:#fff;color:#000;border-radius:16px;padding:20px 18px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.ticket-header{text-align:center;padding-bottom:14px;border-bottom:2px dashed #ccc;margin-bottom:14px}
.ticket-header .title{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;color:#000;letter-spacing:0.05em;text-transform:uppercase}
.ticket-header .subtitle{font-size:13px;color:#666;margin-top:4px;text-transform:uppercase;letter-spacing:0.08em}

.ticket-item{display:flex;align-items:flex-start;padding:14px 0;border-bottom:1px solid #eee}
.ticket-item:last-of-type{border-bottom:none}
.ticket-num{font-family:'Oswald',sans-serif;font-size:26px;font-weight:600;color:#8247f5;min-width:40px;line-height:1}
.ticket-body{flex:1;padding-right:10px}
.ticket-name{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;color:#000;text-transform:uppercase;line-height:1.15;letter-spacing:0.01em}
.ticket-detail{font-size:15px;color:#444;margin-top:6px;line-height:1.4}
.ticket-detail strong{color:#000;font-weight:600}
.ticket-price{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;color:#000;text-align:right;white-space:nowrap;line-height:1}

.ticket-total{margin-top:14px;padding-top:14px;border-top:2px dashed #ccc;display:flex;justify-content:space-between;align-items:center}
.ticket-total .label{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;color:#000;letter-spacing:0.05em}
.ticket-total .value{font-family:'Oswald',sans-serif;font-size:34px;font-weight:700;color:#000}

.ticket-section-title{font-family:'Oswald',sans-serif;font-size:13px;color:#999;text-transform:uppercase;letter-spacing:0.12em;padding:10px 0 6px;border-top:1px solid #eee;margin-top:8px}
.ticket-section-title:first-child{border-top:none;margin-top:0;padding-top:0}
</style>
</head>
