<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c0c">
<title>Fidélité — L'Arène Coffee Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--bg2:#161622;--bg3:#1e1e30;--accent:#4ECDC4;--accent2:#00B894;--text1:#fff;--text2:#b0b0c0;--text3:#666680;--reward:#FF9F43;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text1);min-height:100dvh;overflow-x:hidden}
.container{max-width:420px;margin:0 auto;padding:20px}

/* HEADER */
.header{text-align:center;padding:30px 0 20px}
.header img{width:120px;height:auto;margin-bottom:12px}
.header h1{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text1);font-weight:500}
.header p{font-size:13px;color:var(--text3);margin-top:4px}

/* PHONE INPUT */
.phone-section{margin:20px 0}
.phone-display{background:var(--bg2);border:2px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:16px;position:relative;transition:border-color 0.3s}
.phone-display.focus{border-color:var(--accent)}
.phone-display .phone-text{font-family:'Oswald',sans-serif;font-size:32px;letter-spacing:0.12em;color:var(--text1);min-height:42px;display:flex;align-items:center;justify-content:center}
.phone-display .phone-text.empty{color:var(--text3);font-size:20px;letter-spacing:0.05em}
.phone-display .cursor{display:inline-block;width:2px;height:32px;background:var(--accent);margin-left:4px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.phone-label{font-size:12px;color:var(--text3);margin-bottom:8px;text-align:center;letter-spacing:0.03em}

/* NUMPAD */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.numpad button{padding:18px;font-family:'Oswald',sans-serif;font-size:26px;font-weight:400;border:none;border-radius:14px;background:var(--bg2);color:var(--text1);cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.numpad button:active{transform:scale(0.92);background:var(--bg3)}
.numpad .np-del{color:#FF6347;font-size:22px}
.numpad .np-empty{background:transparent;pointer-events:none}
.submit-btn{width:100%;padding:18px;border:none;border-radius:var(--radius);font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.submit-btn:active{transform:scale(0.97)}
.submit-btn.primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff}
.submit-btn.disabled{background:var(--bg3);color:var(--text3);pointer-events:none}

/* LOADING */
.loading{text-align:center;padding:40px 0}
.loading .spinner{width:40px;height:40px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULT */
.result{animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.welcome{text-align:center;margin-bottom:24px}
.welcome h2{font-family:'Oswald',sans-serif;font-size:24px;font-weight:500;margin-bottom:4px}
.welcome .phone-tag{font-size:13px;color:var(--text3);background:var(--bg2);display:inline-block;padding:4px 14px;border-radius:20px;margin-top:6px}

/* STAMPS */
.stamps-card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border-radius:20px;padding:24px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.stamps-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(78,205,196,0.1) 0%,transparent 70%);border-radius:50%}
.stamps-label{font-size:13px;color:var(--text3);margin-bottom:14px;text-align:center;letter-spacing:0.03em}
.stamps-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.stamp{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.3s;border:2px solid rgba(255,255,255,0.06)}
.stamp.filled{background:linear-gradient(135deg,var(--accent2),var(--accent));border-color:var(--accent2);box-shadow:0 3px 12px rgba(0,184,148,0.25)}
.stamp.filled .s-icon{filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3))}
.stamp.empty{background:rgba(255,255,255,0.03)}
.stamp.empty span{font-family:'Oswald',sans-serif;font-size:14px;color:var(--text3)}
.stamps-progress{display:flex;align-items:center;justify-content:center;gap:8px}
.stamps-count{font-family:'Oswald',sans-serif;font-size:28px;color:var(--accent);font-weight:600}
.stamps-goal{font-size:14px;color:var(--text3)}
.stamps-remaining{text-align:center;font-size:14px;color:var(--text2);margin-top:8px}

/* REWARD EARNED */
.earned-card{background:linear-gradient(135deg,rgba(0,184,148,0.15),rgba(78,205,196,0.08));border:2px solid var(--accent2);border-radius:20px;padding:30px;text-align:center;margin-bottom:20px;animation:earnPulse 2s ease-in-out infinite alternate}
@keyframes earnPulse{from{box-shadow:0 0 10px rgba(0,184,148,0.15)}to{box-shadow:0 0 40px rgba(0,184,148,0.25)}}
.earned-card .earn-emoji{font-size:56px;margin-bottom:12px}
.earned-card h2{font-family:'Oswald',sans-serif;font-size:28px;color:var(--accent2);margin-bottom:8px}
.earned-card p{font-size:16px;color:var(--text2)}
.earned-card .earn-note{font-size:13px;color:var(--text3);margin-top:12px}

/* PENDING REWARDS */
.reward-card{background:linear-gradient(135deg,rgba(255,159,67,0.1),rgba(255,107,107,0.05));border:1px solid rgba(255,159,67,0.2);border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:20px}
.reward-card h3{font-family:'Oswald',sans-serif;font-size:20px;color:var(--reward)}
.reward-card p{font-size:14px;color:var(--text2);margin-top:4px}

/* HISTORY */
.history{margin-bottom:30px}
.history h3{font-family:'Oswald',sans-serif;font-size:18px;color:var(--text2);margin-bottom:12px;letter-spacing:0.03em}
.history-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border-radius:12px;margin-bottom:6px}
.history-item .hi-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.history-item .hi-icon.passage{background:rgba(78,205,196,0.12)}
.history-item .hi-icon.reward{background:rgba(255,159,67,0.12)}
.history-item .hi-icon.used{background:rgba(130,71,245,0.12)}
.history-item .hi-content{flex:1}
.history-item .hi-type{font-family:'Oswald',sans-serif;font-size:15px;color:var(--text1)}
.history-item .hi-date{font-size:12px;color:var(--text3)}
.history-empty{text-align:center;color:var(--text3);font-size:14px;padding:20px}

/* BACK BUTTON */
.back-btn{display:block;width:100%;padding:14px;border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);background:transparent;color:var(--text2);font-family:'Oswald',sans-serif;font-size:16px;cursor:pointer;text-align:center;margin-top:10px;-webkit-tap-highlight-color:transparent}
.back-btn:active{background:rgba(255,255,255,0.04)}

/* FOOTER */
.footer{text-align:center;padding:20px 0 30px;border-top:1px solid rgba(255,255,255,0.05);margin-top:20px}
.footer a{color:var(--accent);text-decoration:none;font-size:13px}
.footer .socials{display:flex;justify-content:center;gap:20px;margin-top:10px}
.footer .socials a{color:var(--text3);font-size:13px;transition:color 0.2s}

/* ERROR */
.error-msg{background:rgba(255,99,71,0.1);border:1px solid rgba(255,99,71,0.2);border-radius:12px;padding:14px;text-align:center;color:#FF6347;font-size:14px;margin-bottom:16px}
</style>
</head>

<script>
const API='https://script.google.com/macros/s/AKfycbwG5NQWo-A02riWxiz2jm3kDPcTmpkRruQx0rnY-opOqeDuhsQDN1n995gQC2WZEAqR/exec';
let phone='';
let state='input'; // input, loading, result, error

function render(){
  const app=document.getElementById('app');
  if(state==='input') renderInput(app);
  else if(state==='loading') renderLoading(app);
  else if(state==='result') renderResult(app);
  else if(state==='error') renderError(app);
}

function renderInput(el){
  let h='';
  h+='<div class="phone-section">';
  h+='<div class="phone-label">Entre ton numéro de téléphone</div>';
  h+='<div class="phone-display'+(phone.length>0?' focus':'')+'">';
  if(phone.length===0){
    h+='<div class="phone-text empty">06 XX XX XX XX<span class="cursor"></span></div>';
  } else {
    h+='<div class="phone-text">'+formatPhone(phone)+'<span class="cursor"></span></div>';
  }
  h+='</div>';
  h+='<div class="numpad">';
  for(let i=1;i<=9;i++) h+='<button onclick="addDigit(\''+i+'\')">'+i+'</button>';
  h+='<button class="np-del" onclick="delDigit()">⌫</button>';
  h+='<button onclick="addDigit(\'0\')">0</button>';
  h+='<button class="np-del" onclick="clearDigits()" style="font-size:16px">Effacer</button>';
  h+='</div>';
  h+='<button class="submit-btn '+(phone.length>=10?'primary':'disabled')+'" onclick="submit()">Voir mon compte</button>';
  h+='</div>';
  el.innerHTML=h;
}

function renderLoading(el){
  el.innerHTML='<div class="loading"><div class="spinner"></div><div style="color:var(--text3)">Chargement...</div></div>';
}

function renderResult(el){
  if(!window._loyaltyData) return;
  const d=window._loyaltyData;
  let h='<div class="result">';
  
  // Reward just earned
  if(d.justEarned){
    h+='<div class="earned-card">';
    h+='<div class="earn-emoji">🎉</div>';
    h+='<h2>FÉLICITATIONS !</h2>';
    h+='<p>Tu as gagné : <strong>'+(d.earnedReward||d.recompense||'Récompense')+'</strong></p>';
    h+='<div class="earn-note">Montre cet écran au comptoir</div>';
    h+='</div>';
  }
  
  // Welcome
  h+='<div class="welcome">';
  h+='<h2>'+(d.isNew?'Bienvenue ! 👋':'Salut ! 💪')+'</h2>';
  h+='<div class="phone-tag">'+formatPhone(d.phone)+'</div>';
  h+='</div>';
  
  // 3 TIERS PROGRESS
  var tiers=d.tiers||[{passages:10,reward:'Shot offert',emoji:'⚡'},{passages:20,reward:'Milkshake offert',emoji:'🥤'},{passages:30,reward:'Bowl offert',emoji:'🍲'}];
  var maxP=d.maxPassages||30;
  
  tiers.forEach(function(t,i){
    var start=i===0?0:tiers[i-1].passages;
    var tierSize=t.passages-start;
    var tierProgress=Math.max(0,Math.min((d.passages||0)-start,tierSize));
    var completed=(d.passages||0)>=t.passages;
    var isCurrent=d.tier&&d.tier.index===i;
    var borderColor=completed?'#00B894':isCurrent?'var(--accent)':'rgba(255,255,255,0.08)';
    
    h+='<div style="background:rgba(255,255,255,'+(isCurrent?'0.05':'0.02')+');border:1px solid '+borderColor+';border-radius:14px;padding:14px 16px;margin-bottom:8px;'+(completed?'opacity:0.6':'')+'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h+='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:22px">'+t.emoji+'</span><span style="font-family:Oswald,sans-serif;font-size:16px;color:#fff">'+t.reward+'</span></div>';
    if(completed) h+='<span style="color:#00B894;font-family:Oswald,sans-serif;font-size:13px">✓ Débloqué</span>';
    else h+='<span style="color:var(--text3);font-family:Oswald,sans-serif;font-size:13px">'+t.passages+' passages</span>';
    h+='</div>';
    var pct=Math.round((tierProgress/tierSize)*100);
    h+='<div style="background:rgba(255,255,255,0.06);border-radius:5px;height:8px;overflow:hidden">';
    h+='<div style="width:'+pct+'%;height:100%;background:linear-gradient(90deg,'+(completed?'#00B894':'var(--accent)')+','+(completed?'#4ECDC4':'#00B894')+');border-radius:5px;transition:width 0.5s"></div>';
    h+='</div>';
    if(isCurrent){
      h+='<div style="text-align:right;font-size:12px;color:var(--text3);margin-top:4px">Encore '+(tierSize-tierProgress)+' passage'+((tierSize-tierProgress)>1?'s':'')+'</div>';
    }
    h+='</div>';
  });
  
  h+='<div style="text-align:center;margin:14px 0"><span style="font-family:Oswald,sans-serif;font-size:26px;color:var(--accent)">'+(d.passages||0)+' / '+maxP+'</span><div style="font-size:12px;color:var(--text3)">passages au total</div></div>';
  
  // History
  if(d.history && d.history.length>0){
    h+='<div class="history">';
    h+='<h3>📋 Historique</h3>';
    d.history.forEach(function(item){
      const isReward=item.type==='Récompense';
      const isUsed=item.type==='Utilisé';
      const iconClass=isReward?'reward':isUsed?'used':'passage';
      const icon=isReward?'🎁':isUsed?'✓':'☕';
      h+='<div class="history-item">';
      h+='<div class="hi-icon '+iconClass+'">'+icon+'</div>';
      h+='<div class="hi-content"><div class="hi-type">'+item.details+'</div><div class="hi-date">'+item.date+' à '+item.heure+'</div></div>';
      h+='</div>';
    });
    h+='</div>';
  } else {
    h+='<div class="history"><h3>📋 Historique</h3><div class="history-empty">Premier passage enregistré !</div></div>';
  }
  
  h+='<button class="back-btn" onclick="reset()">← Autre numéro</button>';
  h+='</div>';
  el.innerHTML=h;
}

function renderError(el){
  let h='<div class="error-msg">Impossible de joindre le serveur. Réessaie dans un instant.</div>';
  h+='<button class="submit-btn primary" onclick="submit()">Réessayer</button>';
  h+='<button class="back-btn" onclick="reset()">← Retour</button>';
  el.innerHTML=h;
}

function formatPhone(p){
  let f='';
  for(let i=0;i<p.length;i++){
    if(i>0 && i%2===0) f+=' ';
    f+=p[i];
  }
  return f;
}

function addDigit(d){
  if(phone.length<10){phone+=d;render();}
}
function delDigit(){
  phone=phone.slice(0,-1);render();
}
function clearDigits(){
  phone='';render();
}
function reset(){
  phone='';state='input';window._loyaltyData=null;render();
}

function jsonp(url,cb){
  var n='jp_'+Date.now()+'_'+Math.floor(Math.random()*99999);
  window[n]=function(d){delete window[n];var s=document.getElementById(n);if(s)s.remove();cb(d);};
  var s=document.createElement('script');s.id=n;
  s.src=url+(url.indexOf('?')>=0?'&':'?')+'callback='+n;
  s.onerror=function(){delete window[n];s.remove();cb(null);};
  document.body.appendChild(s);
}

function submit(){
  if(phone.length<10) return;
  state='loading';
  render();
  
  jsonp(API+'?action=check&phone='+encodeURIComponent(phone),function(data){
    if(data && data.success){
      window._loyaltyData=data;
      state='result';
    } else {
      state='error';
    }
    render();
  });
}

// Check URL params for pre-filled phone
const urlParams=new URLSearchParams(window.location.search);
const prePhone=urlParams.get('phone');
if(prePhone && prePhone.length>=10){
  phone=prePhone.replace(/\s/g,'').slice(0,10);
  submit();
} else {
  render();
}
</script>
</body>
</html>
