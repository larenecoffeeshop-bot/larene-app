<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c0c">
<title>Commandes — L'Arène</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--bg2:#161622;--accent:#4ECDC4;--text1:#fff;--text2:#b0b0c0;--text3:#666680}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text1);min-height:100dvh}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)}
.header h1{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:0.05em}
.header .status{font-size:12px;color:var(--accent);display:flex;align-items:center;gap:6px}
.header .status .dot{width:8px;height:8px;border-radius:50%;background:#00B894;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.orders{padding:12px}
.order-card{background:var(--bg2);border-radius:16px;padding:16px;margin-bottom:10px;border-left:4px solid #FF9F43;transition:all 0.3s}
.order-card.done{border-left-color:#00B894;opacity:0.5}
.order-card.new-order{animation:slideIn 0.4s ease,glow 1s ease}
@keyframes slideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes glow{0%{box-shadow:0 0 20px rgba(255,159,67,0.4)}100%{box-shadow:none}}
.order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.order-num{font-family:'Oswald',sans-serif;font-size:24px;color:#FF9F43;font-weight:600}
.order-time{font-size:13px;color:var(--text3)}
.order-phone{font-size:14px;color:var(--accent);margin-bottom:8px}
.order-items{font-size:14px;color:var(--text2);line-height:1.8}
.order-item{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.order-total{font-family:'Oswald',sans-serif;font-size:22px;color:var(--text1);margin-top:10px;text-align:right}
.order-actions{margin-top:12px}
.btn-done{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Oswald',sans-serif;font-size:18px;cursor:pointer;transition:all 0.2s}
.btn-done.primary{background:#00B894;color:#fff}
.btn-done.primary:active{transform:scale(0.95)}
.btn-done.is-disabled{background:rgba(0,184,148,0.15);color:#00B894;pointer-events:none}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:12px}
.counter{display:flex;justify-content:center;gap:20px;padding:12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.counter .c-item{text-align:center}
.counter .c-num{font-family:'Oswald',sans-serif;font-size:28px;font-weight:600}
.counter .c-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.c-encours .c-num{color:#FF9F43}
.c-fait .c-num{color:#00B894}
</style>
</head>
<body>
<div class="header">
  <h1>🍽️ Commandes</h1>
  <div class="status"><div class="dot"></div><span id="status-text">Connexion...</span></div>
</div>
<div class="counter">
  <div class="c-item c-encours"><div class="c-num" id="count-pending">-</div><div class="c-label">En cours</div></div>
  <div class="c-item c-fait"><div class="c-num" id="count-done">-</div><div class="c-label">Faites</div></div>
</div>
<div class="orders" id="orders-list">
  <div class="empty"><div class="icon">⏳</div><p>Chargement...</p></div>
</div>

<script>
var API='https://script.google.com/macros/s/AKfycbzhzkIBU7IaJHNtAHTa82CYN6QOapLAlvx1bBrdncRH-1itZF7-GoOghIho26OHJHld/exec';
var knownIds={};
var firstLoad=true;

// ===== JSONP LOADER (bypasses CORS) =====
function jsonp(url,callback){
  var cbName='jsonp_'+Date.now()+'_'+Math.floor(Math.random()*10000);
  window[cbName]=function(data){
    delete window[cbName];
    var script=document.getElementById(cbName);
    if(script) script.remove();
    callback(data);
  };
  var script=document.createElement('script');
  script.id=cbName;
  script.src=url+(url.indexOf('?')>=0?'&':'?')+'callback='+cbName;
  script.onerror=function(){
    delete window[cbName];
    script.remove();
    callback(null);
  };
  document.body.appendChild(script);
}

function loadOrders(){
  jsonp(API+'?action=list',function(data){
    if(!data||!data.success){
      document.getElementById('status-text').textContent='Erreur connexion';
      return;
    }
    document.getElementById('status-text').textContent='Auto-refresh 5s';
    renderOrders(data.orders);
  });
}

function renderOrders(orders){
  var el=document.getElementById('orders-list');
  var pending=orders.filter(function(o){return o.statut==='EN COURS';});
  var done=orders.filter(function(o){return o.statut==='FAIT';});
  
  document.getElementById('count-pending').textContent=pending.length;
  document.getElementById('count-done').textContent=done.length;
  
  if(orders.length===0){
    el.innerHTML='<div class="empty"><div class="icon">☕</div><p>Aucune commande aujourd\'hui</p></div>';
    firstLoad=false;
    return;
  }
  
  var hasNew=false;
  orders.forEach(function(o){
    if(o.statut==='EN COURS'&&!knownIds[o.id]) hasNew=true;
    knownIds[o.id]=true;
  });
  if(hasNew&&!firstLoad) playAlert();
  firstLoad=false;
  
  var html='';
  var sorted=pending.concat(done);
  
  sorted.forEach(function(order){
    var isDone=order.statut==='FAIT';
    html+='<div class="order-card'+(isDone?' done':'')+'">';
    html+='<div class="order-top"><div class="order-num">'+order.id+'</div><div class="order-time">'+order.heure+'</div></div>';
    if(order.phone&&order.phone!='') html+='<div class="order-phone">📱 '+formatPhone(order.phone)+'</div>';
    html+='<div class="order-items">';
    order.detail.split('|').forEach(function(item){
      item=item.trim();
      if(item) html+='<div class="order-item">'+item+'</div>';
    });
    html+='</div>';
    html+='<div class="order-total">'+order.total+'</div>';
    html+='<div class="order-actions">';
    if(isDone) html+='<button class="btn-done is-disabled">✓ Fait</button>';
    else html+='<button class="btn-done primary" onclick="markDone('+order.row+',this)">✓ C\'est prêt !</button>';
    html+='</div></div>';
  });
  
  el.innerHTML=html;
}

function formatPhone(p){
  if(!p)return'';p=String(p);var f='';
  for(var i=0;i<p.length;i++){if(i>0&&i%2===0)f+=' ';f+=p[i];}
  return f;
}

function markDone(row,btn){
  btn.textContent='...';
  btn.className='btn-done is-disabled';
  jsonp(API+'?action=done&row='+row,function(){
    setTimeout(loadOrders,1000);
  });
}

function playAlert(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.2,0.5].forEach(function(d){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=d===0.5?1046:880;o.type='sine';g.gain.value=0.4;
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.15);
    });
  }catch(e){}
  if(navigator.vibrate)navigator.vibrate([200,100,200]);
}

loadOrders();
setInterval(loadOrders,5000);
</script>
</body>
</html>
