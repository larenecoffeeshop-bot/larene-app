<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c0c">
<title>Commandes — L'Arène</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--bg2:#161622;--bg3:#1e1e30;--accent:#4ECDC4;--text1:#fff;--text2:#b0b0c0;--text3:#666680;--orange:#FF9F43;--green:#00B894;--red:#FF6347}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text1);min-height:100dvh}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.06)}
.header h1{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:0.05em}
.header .status{font-size:11px;color:var(--accent);display:flex;align-items:center;gap:6px}
.header .status .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* COUNTER */
.counter{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.06)}
.counter .c-item{flex:1;text-align:center;padding:14px 0;cursor:pointer;transition:background 0.2s}
.counter .c-item:first-child{border-right:1px solid rgba(255,255,255,0.06)}
.counter .c-num{font-family:'Oswald',sans-serif;font-size:32px;font-weight:600}
.counter .c-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}
.c-encours .c-num{color:var(--orange)}
.c-fait .c-num{color:var(--green)}

/* SECTIONS */
.section-title{font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:0.06em;text-transform:uppercase;padding:14px 16px 8px;color:var(--text3)}
.section-title.encours{color:var(--orange)}
.section-title.termine{color:var(--green)}

/* ORDER CARDS */
.orders{padding:0 12px 12px}
.order-card{background:var(--bg2);border-radius:16px;padding:16px;margin-bottom:10px;border-left:4px solid var(--orange);transition:all 0.3s}
.order-card.done{border-left-color:var(--green);opacity:0.4}
.order-card.new-order{animation:slideIn 0.5s ease,glowPulse 2s ease}
@keyframes slideIn{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes glowPulse{0%{box-shadow:0 0 30px rgba(255,159,67,0.5)}100%{box-shadow:none}}
.order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.order-id{font-family:'Oswald',sans-serif;font-size:22px;color:var(--orange);font-weight:600}
.order-time{font-size:12px;color:var(--text3);background:var(--bg3);padding:4px 10px;border-radius:20px}
.order-phone{font-size:15px;color:var(--accent);margin-bottom:10px;font-weight:500}
.order-items{font-size:14px;color:var(--text2);line-height:1.7}
.order-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.order-item:last-child{border:none}
.order-total{font-family:'Oswald',sans-serif;font-size:24px;color:var(--text1);margin-top:12px;text-align:right;font-weight:600}
.btn-done{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-family:'Oswald',sans-serif;font-size:20px;cursor:pointer;transition:all 0.15s;margin-top:12px;letter-spacing:0.04em}
.btn-done:active{transform:scale(0.96)}
.btn-pret{background:linear-gradient(135deg,var(--green),#4ECDC4);color:#fff;box-shadow:0 4px 15px rgba(0,184,148,0.3)}
.btn-fait{background:rgba(0,184,148,0.1);color:var(--green);pointer-events:none}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:15px}

/* ===== NEW ORDER POPUP ===== */
#new-order-popup{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:30px}
#new-order-popup.show{display:flex}
.popup-content{background:linear-gradient(145deg,#1a1a2e,#0c0c0c);border:2px solid var(--orange);border-radius:24px;padding:30px;max-width:440px;width:100%;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
.popup-emoji{font-size:64px;margin-bottom:12px;animation:shake 0.5s ease}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
.popup-title{font-family:'Oswald',sans-serif;font-size:28px;color:var(--orange);margin-bottom:6px;letter-spacing:0.05em}
.popup-phone{font-size:18px;color:var(--accent);margin-bottom:14px}
.popup-detail{font-size:15px;color:var(--text2);line-height:1.7;margin-bottom:14px;text-align:left;background:rgba(255,255,255,0.03);padding:12px 16px;border-radius:12px}
.popup-total{font-family:'Oswald',sans-serif;font-size:30px;color:#fff;margin-bottom:20px}
.popup-btn{width:100%;padding:16px;border:none;border-radius:14px;font-family:'Oswald',sans-serif;font-size:20px;cursor:pointer;background:var(--orange);color:#fff;letter-spacing:0.04em}
.popup-btn:active{transform:scale(0.96)}
</style>
</head>
<body>
<div class="header">
  <h1>🍽️ Commandes</h1>
  <div class="status"><div class="dot"></div><span id="status-text">Connexion...</span></div>
</div>
<div class="counter">
  <div class="c-item c-encours"><div class="c-num" id="count-pending">-</div><div class="c-label">🔥 En cours</div></div>
  <div class="c-item c-fait"><div class="c-num" id="count-done">-</div><div class="c-label">✅ Terminées</div></div>
</div>
<div id="orders-container"></div>

<!-- NEW ORDER POPUP -->
<div id="new-order-popup" onclick="closePopup()">
  <div class="popup-content" onclick="event.stopPropagation()">
    <div class="popup-emoji">🔔</div>
    <div class="popup-title">NOUVELLE COMMANDE !</div>
    <div class="popup-phone" id="popup-phone"></div>
    <div class="popup-detail" id="popup-detail"></div>
    <div class="popup-total" id="popup-total"></div>
    <button class="popup-btn" onclick="closePopup()">👍 OK, C'EST NOTÉ !</button>
  </div>
</div>

<script>
var API='https://script.google.com/macros/s/AKfycbzhzkIBU7IaJHNtAHTa82CYN6QOapLAlvx1bBrdncRH-1itZF7-GoOghIho26OHJHld/exec';
var knownIds={};
var firstLoad=true;
var popupQueue=[];

function jsonp(url,callback){
  var cbName='jp_'+Date.now()+'_'+Math.floor(Math.random()*99999);
  window[cbName]=function(data){delete window[cbName];var s=document.getElementById(cbName);if(s)s.remove();callback(data);};
  var s=document.createElement('script');s.id=cbName;
  s.src=url+(url.indexOf('?')>=0?'&':'?')+'callback='+cbName;
  s.onerror=function(){delete window[cbName];s.remove();callback(null);};
  document.body.appendChild(s);
}

function loadOrders(){
  jsonp(API+'?action=list',function(data){
    if(!data||!data.success){
      document.getElementById('status-text').textContent='Erreur connexion';
      return;
    }
    document.getElementById('status-text').textContent='Auto-refresh 5s';
    processOrders(data.orders);
  });
}

function processOrders(orders){
  var pending=orders.filter(function(o){return o.statut==='EN COURS';});
  var done=orders.filter(function(o){return o.statut==='FAIT';});
  
  document.getElementById('count-pending').textContent=pending.length;
  document.getElementById('count-done').textContent=done.length;
  
  // Detect new orders for popup
  if(!firstLoad){
    orders.forEach(function(o){
      if(o.statut==='EN COURS'&&!knownIds[o.id+o.heure]){
        popupQueue.push(o);
      }
    });
    if(popupQueue.length>0) showNextPopup();
  }
  orders.forEach(function(o){knownIds[o.id+o.heure]=true;});
  firstLoad=false;
  
  // Render
  var container=document.getElementById('orders-container');
  var html='';
  
  // SECTION EN COURS
  html+='<div class="section-title encours">🔥 En cours ('+pending.length+')</div>';
  html+='<div class="orders">';
  if(pending.length===0){
    html+='<div class="empty">Aucune commande en attente</div>';
  } else {
    pending.forEach(function(order){
      html+=renderCard(order,false);
    });
  }
  html+='</div>';
  
  // SECTION TERMINÉES
  if(done.length>0){
    html+='<div class="section-title termine">✅ Terminées ('+done.length+')</div>';
    html+='<div class="orders">';
    done.forEach(function(order){
      html+=renderCard(order,true);
    });
    html+='</div>';
  }
  
  container.innerHTML=html;
}

function renderCard(order,isDone){
  var h='<div class="order-card'+(isDone?' done':'')+'">';
  h+='<div class="order-top"><div class="order-id">'+order.id+'</div><div class="order-time">'+order.heure+'</div></div>';
  if(order.phone&&order.phone!='')h+='<div class="order-phone">📱 '+formatPhone(order.phone)+'</div>';
  h+='<div class="order-items">';
  order.detail.split('|').forEach(function(item){
    item=item.trim();
    if(item)h+='<div class="order-item">'+item+'</div>';
  });
  h+='</div>';
  h+='<div class="order-total">'+order.total+'</div>';
  if(isDone){
    h+='<button class="btn-done btn-fait">✓ Terminée</button>';
  } else {
    h+='<button class="btn-done btn-pret" onclick="markDone('+order.row+',this)">✓ C\'EST PRÊT !</button>';
  }
  h+='</div>';
  return h;
}

function formatPhone(p){
  if(!p)return'';p=String(p);var f='';
  for(var i=0;i<p.length;i++){if(i>0&&i%2===0)f+=' ';f+=p[i];}
  return f;
}

function markDone(row,btn){
  btn.textContent='⏳...';
  btn.className='btn-done btn-fait';
  jsonp(API+'?action=done&row='+row,function(){
    setTimeout(loadOrders,800);
  });
}

// ===== POPUP =====
function showNextPopup(){
  if(popupQueue.length===0) return;
  var order=popupQueue.shift();
  
  document.getElementById('popup-phone').textContent=order.phone?'📱 '+formatPhone(order.phone):'';
  
  var detailHtml='';
  order.detail.split('|').forEach(function(item){
    item=item.trim();
    if(item) detailHtml+=item+'<br>';
  });
  document.getElementById('popup-detail').innerHTML=detailHtml;
  document.getElementById('popup-total').textContent=order.total;
  
  document.getElementById('new-order-popup').classList.add('show');
  playAlert();
}

function closePopup(){
  document.getElementById('new-order-popup').classList.remove('show');
  if(popupQueue.length>0) setTimeout(showNextPopup,500);
}

function playAlert(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    // 3 beeps ascending
    var notes=[660,880,1100];
    notes.forEach(function(freq,i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type='sine';g.gain.value=0.5;
      o.start(ctx.currentTime+i*0.2);o.stop(ctx.currentTime+i*0.2+0.15);
    });
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
}

loadOrders();
setInterval(loadOrders,5000);
</script>
</body>
</html>
